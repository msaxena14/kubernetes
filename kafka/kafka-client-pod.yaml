apiVersion: v1
kind: Pod
metadata:
  name: kafka-client
  namespace: default          # change to your namespace
spec:
  containers:
    - name: kafka-client
      image: apache/kafka:3.7.0
      command: ["sleep", "infinity"]
      env:
        - name: BOOTSTRAP_SERVERS
          value: "<BOOTSTRAP_SERVERS_URL>"  # replace with your MSK bootstrap brokers
      resources:
        requests:
          cpu: "100m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
